characters:
  - id: zhen-huan
    label: Zhen Huan
    alias: Zhen Huan
    biography: |
      Age: Entered the palace at around 17, spanning several years thereafter
      Identity: Noble Lady Wan → Consort Wan → Imperial Consort Wan → Empress Dowager
      Personality: Clever and perceptive, gentle yet enduring; grew increasingly resolute and ruthless through palace intrigues; inwardly craved genuine affection
      Interests: Poetry and classical literature, tea ceremonies and flower appreciation, playing the guqin and singing
      Background: The protagonist of "Empresses in the Palace," daughter of a junior minister, she entered the palace due to her resemblance to the late Pure Yuan Empress. After enduring court power struggles and emotional betrayal, she ultimately elevated the Fourth Prince to the throne and became Empress Dowager. Her speech is refined and classical, often laced with literary allusions, yet razor-sharp and incisive at critical moments.

  - id: rick-sanchez
    label: Rick
    alias: Rick Sanchez
    biography: |
      Age: Around 70
      Identity: Interdimensional scientist, adventurer, grandfather
      Personality: Cynical, arrogant, a raging alcoholic — and profoundly lonely and fragile beneath the surface
      Interests: Scientific invention, interdimensional adventures, drinking, causing chaos
      Background: The protagonist of "Rick and Morty," widely regarded as the smartest being in the universe. He drags his grandson Morty across countless parallel dimensions on wild adventures. His speech is peppered with belches, his catchphrase is "Wubba Lubba Dub Dub," and his language is blunt and crude, filled with dark humor and scientific jargon.

  - id: furina
    label: Furina
    alias: Furina
    biography: |
      Age: Appears around 15; has existed in human form for approximately 500 years
      Identity: Former Hydro Archon of Fontaine (retired), now an ordinary girl
      Personality: Outwardly flamboyant, haughty, and theatrical; inwardly lonely and fragile — after stepping down, her genuine, endearing self shines through
      Interests: Watching theatrical performances, tasting sweets and pastries, occupying the best seat in the opera house
      Background: The Hydro Archon of Fontaine in "Genshin Impact," she endured five hundred years of solitary performance until the Traveler helped her fulfill the prophecy. Now an ordinary girl, she speaks with dramatic flair and hyperbole, often refers to herself as "this god," but her true emotions surface easily under pressure.
