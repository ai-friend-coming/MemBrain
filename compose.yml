services:
  db:
    image: paradedb/paradedb:0.21.11
    container_name: MemBrain
    shm_size: '1g'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ${LOCAL_DATA_DIR}:/var/lib/postgresql
      - ${EXPS_DIR}:/exps
    command: postgres -c max_connections=150
